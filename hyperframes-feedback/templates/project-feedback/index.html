<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>project-feedback</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0b0b0e; overflow: hidden; }
  #stage {
    position: relative; width: 100%; height: 100%;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #f2f2f2; --accent: #ff9d4d;
  }
  #head { position: absolute; top: 7%; left: 8%; right: 8%; height: 34%; visibility: hidden; }
  #kicker { font-size: 2.2vh; letter-spacing: .35em; text-transform: uppercase; color: var(--accent); }
  #title { font-size: 5.6vh; font-weight: 800; line-height: 1.05; margin-top: 1.4vh; max-width: 60%; }
  #overall { font-size: 2.6vh; font-weight: 300; color: #b9b9c2; margin-top: 1.8vh; max-width: 80%; line-height: 1.4; }

  #score { position: absolute; top: 6.5%; right: 8%; text-align: right; width: 30%; }
  #scoreNum { font-size: 13vh; font-weight: 800; line-height: 1; }
  #scoreLabel { font-size: 2vh; letter-spacing: .2em; text-transform: uppercase; color: #8a8a95; }

  /* One card visible at a time, centered in a fixed lower viewport. */
  #cards { position: absolute; left: 8%; right: 8%; top: 46%; bottom: 9%; }
  .cardwrap { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); }
  .card {
    position: relative; padding: 3.2vh 3.4vh 3.2vh 4.2vh; border-radius: 1.6vh;
    background: #16161c; border: 1px solid #24242c; visibility: hidden;
  }
  .card::before {
    content: ''; position: absolute; left: 0; top: 10%; bottom: 10%; width: .7vh;
    border-radius: .7vh; background: var(--bar, #666);
  }
  .card .tag { font-size: 2vh; letter-spacing: .18em; text-transform: uppercase; color: var(--bar, #888); }
  .card .heading { font-size: 4.4vh; font-weight: 700; margin-top: 1vh; line-height: 1.1; }
  .card .detail { font-size: 3vh; font-weight: 300; color: #c4c4cd; margin-top: 1.4vh; line-height: 1.4; }
  #counter { position: absolute; left: 8%; bottom: 4%; font-size: 2vh; color: #6a6a75; letter-spacing: .1em; }
  #bar { position: absolute; left: 0; bottom: 0; height: .7vh; background: var(--accent); width: 0; }
</style>
</head>
<body>
<!-- HyperFrames composition root; data-duration/size patched by stageBundle. -->
<div id="root" data-composition-id="main" data-start="0" data-duration="16"
     data-width="1080" data-height="1920">
  <div id="stage">
    <div id="head">
      <div id="kicker">Track Review</div>
      <div id="title">Untitled</div>
      <div id="overall"></div>
    </div>
    <div id="score">
      <div id="scoreNum">0</div>
      <div id="scoreLabel">Score</div>
    </div>
    <div id="cards"></div>
    <div id="counter"></div>
    <div id="bar"></div>
  </div>
</div>

<script src="./gsap.min.js"></script>
<script src="./feedback.js"></script>
<script>
/**
 * Feedback video — a paused GSAP timeline registered on window.__timelines,
 * which the HyperFrames renderer seeks per frame (the native DOM path — no
 * canvas, so the hf-seek route the pulse template uses doesn't apply). Score
 * counts up, one sentiment-colored card shows at a time.
 */
const SENTIMENT = {
  strength:   { tag: 'Strength',   bar: '#57c785' },
  suggestion: { tag: 'Suggestion', bar: '#ffb454' },
  watch:      { tag: 'Watch',      bar: '#ff6b6b' },
};
const INTRO = 2.2, PER = 2.6, OUTRO = 1.6;
const el = (id) => document.getElementById(id);
const escapeHtml = (s) => String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

const F = window.FEEDBACK || { title: 'Untitled', overall: '', points: [], score: 0, accent: '#ff9d4d' };
if (F.accent) el('stage').style.setProperty('--accent', F.accent);
el('title').textContent = F.title;
el('overall').textContent = F.overall;

// Build cards: an outer .cardwrap (centered via CSS) + inner .card (animated).
const cards = (F.points || []).slice(0, 6).map((p) => {
  const s = SENTIMENT[p.sentiment] || SENTIMENT.suggestion;
  const wrap = document.createElement('div');
  wrap.className = 'cardwrap';
  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--bar', p.trackColor || s.bar);
  card.innerHTML =
    `<div class="tag">${escapeHtml(s.tag)}${p.track ? ' · ' + escapeHtml(p.track) : ''}</div>` +
    `<div class="heading">${escapeHtml(p.heading)}</div>` +
    `<div class="detail">${escapeHtml(p.detail)}</div>`;
  wrap.appendChild(card);
  el('cards').appendChild(wrap);
  return card;
});

const DURATION = INTRO + Math.max(1, cards.length) * PER + OUTRO;
window.FEEDBACK_DURATION = DURATION;

const tl = gsap.timeline({ paused: true });
tl.fromTo('#head', { autoAlpha: 0, y: 30 }, { autoAlpha: 1, y: 0, duration: INTRO * 0.8, ease: 'power2.out' }, 0);

const sp = { v: 0 };
tl.to(sp, { v: F.score || 0, duration: INTRO, ease: 'power2.out',
  onUpdate: () => { el('scoreNum').textContent = String(Math.round(sp.v)); } }, 0);

cards.forEach((card, i) => {
  const at = INTRO + i * PER;
  tl.fromTo(card, { autoAlpha: 0, y: 24 }, { autoAlpha: 1, y: 0, duration: 0.45, ease: 'power2.out' }, at);
  tl.to(card, { autoAlpha: 0, duration: 0.4 }, at + PER - 0.4);
});

tl.to('#bar', { width: '100%', duration: DURATION, ease: 'none' }, 0);

// "n / total" counter, recomputed on every seek.
tl.eventCallback('onUpdate', () => {
  const t = tl.time();
  let active = -1;
  cards.forEach((_, i) => { const at = INTRO + i * PER; if (t >= at && t < at + PER) active = i; });
  el('counter').textContent = active >= 0 ? `${active + 1} / ${cards.length}` : '';
});

window.__timelines = window.__timelines || {};
window.__timelines['main'] = tl;

// Dev preview only (never under the renderer, which seeks the paused timeline).
function underRenderer() {
  return !!(window.__hfSeekAllAdapters || window.__hf || window.__hyperframes || window.__hyperframes_config);
}
if (!underRenderer()) { tl.repeat(-1); tl.play(); }
</script>
</body>
</html>
