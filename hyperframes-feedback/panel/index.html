<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Render Video</title>
<style>
  /* Live dark theme; the clip's own color is the only accent (§5.4). */
  :root { --accent: #ff9d4d; }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: hsl(0,0%,21%); color: hsl(0,0%,71%);
    font: 12px/1.45 -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; padding: 16px; gap: 12px;
  }
  h1 { font-size: 14px; font-weight: 600; color: #e8e8e8; display: flex; align-items: center; gap: 8px; }
  h1 .swatch { width: 12px; height: 12px; border-radius: 3px; background: var(--accent); }
  .meta { color: hsl(0,0%,50%); }
  fieldset { border: 1px solid hsl(0,0%,12%); border-radius: 6px; padding: 10px 12px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  legend { color: hsl(0,0%,45%); padding: 0 6px; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; }
  label { display: flex; align-items: center; gap: 6px; }
  select {
    background: hsl(0,0%,12%); color: hsl(0,0%,80%); border: 1px solid hsl(0,0%,7%);
    border-radius: 4px; padding: 4px 8px; font: inherit;
  }
  .note { color: hsl(31,60%,60%); font-size: 11px; }
  button {
    background: hsl(0,0%,16%); color: hsl(0,0%,80%); border: 1px solid hsl(0,0%,7%);
    border-radius: 12px; padding: 6px 18px; font: inherit; cursor: pointer;
  }
  button:hover { background: hsl(0,0%,20%); }
  button.primary { background: var(--accent); border-color: transparent; color: #1a1200; font-weight: 600; }
  .spacer { flex: 1; }
  footer { display: flex; gap: 10px; align-items: center; margin-top: auto; }
</style>
</head>
<body>
  <h1><span class="swatch"></span><span id="title">Render Video</span></h1>
  <div class="meta" id="meta"></div>

  <fieldset>
    <legend>Render</legend>
    <label>Style <select id="style"></select></label>
    <label>Aspect <select id="aspect">
      <option>9:16</option><option>1:1</option><option>16:9</option>
    </select></label>
    <label>FPS <select id="fps"><option>30</option><option>60</option></select></label>
  </fieldset>

  <div class="note" id="note"></div>

  <footer>
    <span class="spacer"></span>
    <button id="cancel">Cancel</button>
    <button id="render" class="primary">Render</button>
  </footer>

<script>
// The Node side replaces the `null` token below with the session JSON before
// encoding this page as a data: URL. Valid syntax both before (null) and
// after (an object literal) injection.
const INJECTED = null /*__STUDIO_DATA__*/;
const STUDIO = INJECTED || { timeline: null, availableStyles: [], audioAvailable: false };

function send(result) {
  const msg = { method: 'close_and_send', params: [JSON.stringify(result)] };
  const mac = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.live;
  const win = window.chrome && window.chrome.webview;
  if (mac) mac.postMessage(msg);
  else if (win) win.postMessage(msg);
}

const $ = (id) => document.getElementById(id);

if (STUDIO.timeline) {
  const t = STUDIO.timeline;
  const accent = (t.meta && t.meta.clipColor) || '#ff9d4d';
  document.documentElement.style.setProperty('--accent', accent);
  $('title').textContent = t.meta.title || 'Untitled clip';
  $('meta').textContent =
    `${t.meta.sourceScope} · ${t.timing.tempoMap[0].bpm} BPM · ` +
    `${t.timing.durationBeats} beats (${t.audio.durationSeconds.toFixed(2)}s) · ` +
    `${t.notes.length} notes · ${t.markers.length} markers`;
  $('style').replaceChildren(...STUDIO.availableStyles.map((s) => {
    const o = document.createElement('option');
    o.value = s.id; o.textContent = (s.manifest && s.manifest.displayName) || s.id;
    return o;
  }));
  if (!STUDIO.audioAvailable) {
    $('note').textContent =
      'No bounced audio — this SDK build can’t render the mix programmatically. ' +
      'The video will render silent; export audio manually to add the track.';
  }
}

$('render').onclick = () => send({
  action: 'render',
  style: $('style').value,
  aspect: $('aspect').value,
  fps: Number($('fps').value),
});
$('cancel').onclick = () => send({ action: 'cancel' });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') send({ action: 'cancel' }); });
</script>
</body>
</html>
